<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxNwKN_MwXOhCLyeBmuFBlkJjFkKi_iLFBLs9znxg4xw9jKefCmq0GBCcQbhE04lsNd/exec';

    // Função para trocar de aba no HTML
    function showSection(sectionId) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById('section-' + sectionId).classList.add('active');
        document.getElementById('btn-' + sectionId).classList.add('active');
    }

    // Função única para enviar qualquer formulário
    function enviarDados(event, nomeAba) {
        event.preventDefault();
        const form = event.target;
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.innerText = 'Enviando...';

        // Pega todos os dados do formulário automaticamente
        const formData = new FormData(form);
        const objetoDados = { abaDestino: nomeAba };
        formData.forEach((value, key) => objetoDados[key] = value);

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(objetoDados) })
        .then(res => {
            alert('Dados salvos com sucesso na aba ' + nomeAba);
            form.reset();
        })
        .catch(err => alert('Erro: ' + err.message))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = 'Enviar';
        });
    }
</script>
